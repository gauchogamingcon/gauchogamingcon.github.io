<script>    

    console.log(document.querySelector('.header-container').dataset.pageType);
    console.log(document.querySelector('.header-container').dataset.layout);

    if (!document.querySelector('.header-container').dataset.custom_js) {
        console.log('Removing content-loading class due to custom_js not being set');
        document.querySelector('#content-container').classList.remove('content-loading');
    }

    if (document.querySelector('#no-playtesters')) {
        document.querySelector('#acknowledgements').style.display = 'none';
    }

    // Toggle notes dropdown
    function toggleNotes(arrowElement) {
        const dropdown = arrowElement.parentElement.querySelector('.notes-dropdown');
        const isVisible = dropdown.style.display !== 'none';
        
        if (isVisible) {
            dropdown.style.display = 'none';
            arrowElement.textContent = '▶';
        } else {
            dropdown.style.display = 'block';
            arrowElement.textContent = '▼';
        }
    }

    
    document.addEventListener('DOMContentLoaded', function() {
        // Auto-load content from data attributes
        loadAllContent();
        const html = document.querySelector('html');
        console.log('Loading content: ' + html.innerHTML);
        html.innerHTML = convertToDivs(extractContentFromHtml(html.innerHTML));
        console.log('Loading content: ' + html.innerHTML);
        document.querySelector('#content-container').classList.remove('content-loading');
    });
</script>
